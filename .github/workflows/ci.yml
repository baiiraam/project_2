name: CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check src/ tests/ --target-version=py311

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ty

      - name: Type check with ty
        run: ty check src/ --exclude 'ai/'

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock

      - name: Run tests with coverage
        run: OTEL_SDK_DISABLED=true pytest tests/ --cov=src --cov-fail-under=60 --cov-report=term-missing -v
        env:
          LLM_PROVIDER: openai
          LLM_MODEL: gpt-4o-mini
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: https://openrouter.ai/api/v1
          CACHE_BACKEND: json
          JSON_CACHE_MAX_SIZE_MB: 100
          JSON_CACHE_BACKUP_COUNT: 3
          NUTRITION_PROVIDER: usda
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
          HTTP_CACHE_ENABLED: true
          HTTP_CACHE_TTL_SECONDS: 86400
          LOG_LEVEL: INFO
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NUTRITION_CACHE_TTL_SECONDS: 86400
          MAX_IMAGE_SIZE_MB: 5
          HTTP_PORT: 8000

  docker-build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and run with docker-compose
      run: |
        docker compose up -d --build
        echo "Waiting for services to be ready..."
        sleep 30
        echo "=== Container Status ==="
        docker compose ps
        echo "=== Testing API through Nginx (port 80) ==="
        # Test through Nginx instead of direct API access
        curl -f http://localhost/health || (docker compose logs && exit 1)
        echo "=== Testing Web UI ==="
        curl -f http://localhost/ | head -20
        echo "=== All tests passed ==="
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
        OPENAI_BASE_URL: https://openrouter.ai/api/v1
        LLM_PROVIDER: openai
        NUTRITION_PROVIDER: usda
        LOG_LEVEL: INFO

    - name: Cleanup
      if: always()
      run: docker compose down
