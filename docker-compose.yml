services:
  postgres:
    image: postgres:16-alpine
    container_name: food-analyzer-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: foodanalyzer
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foodanalyzer"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.multistage  # ← IMPORTANT: Specify the correct Dockerfile
    container_name: food-analyzer-api
    command: sh -c "uvicorn src.api.app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/foodanalyzer
      CACHE_BACKEND: json
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      NUTRITION_PROVIDER: ${NUTRITION_PROVIDER}
      USDA_API_KEY: ${USDA_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL}
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./.cache:/app/.cache
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data: