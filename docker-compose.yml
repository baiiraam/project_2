services:
  # ============================================================
  # Nginx - Load Balancer with Round-Robin
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: food-analyzer-nginx
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS (optional)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api1
      - api2
      - api3
    restart: unless-stopped
    networks:
      - food-analyzer-network

  # ============================================================
  # API Instance 1
  # ============================================================
  api1:
    build:
      context: .
      dockerfile: Dockerfile.multistage
    container_name: food-analyzer-api-1
    command: sh -c "uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --proxy-headers"
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/foodanalyzer
      CACHE_BACKEND: json
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      NUTRITION_PROVIDER: ${NUTRITION_PROVIDER}
      USDA_API_KEY: ${USDA_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FORMAT: json
      PYTHONPATH: /app
      BEHIND_REVERSE_PROXY: "true"
      INSTANCE_ID: "1"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - food-analyzer-network

  # ============================================================
  # API Instance 2
  # ============================================================
  api2:
    build:
      context: .
      dockerfile: Dockerfile.multistage
    container_name: food-analyzer-api-2
    command: sh -c "uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --proxy-headers"
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/foodanalyzer
      CACHE_BACKEND: json
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      NUTRITION_PROVIDER: ${NUTRITION_PROVIDER}
      USDA_API_KEY: ${USDA_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FORMAT: json
      PYTHONPATH: /app
      BEHIND_REVERSE_PROXY: "true"
      INSTANCE_ID: "2"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - food-analyzer-network

  # ============================================================
  # API Instance 3
  # ============================================================
  api3:
    build:
      context: .
      dockerfile: Dockerfile.multistage
    container_name: food-analyzer-api-3
    command: sh -c "uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --proxy-headers"
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/foodanalyzer
      CACHE_BACKEND: json
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      NUTRITION_PROVIDER: ${NUTRITION_PROVIDER}
      USDA_API_KEY: ${USDA_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FORMAT: json
      PYTHONPATH: /app
      BEHIND_REVERSE_PROXY: "true"
      INSTANCE_ID: "3"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - food-analyzer-network

  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: food-analyzer-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: foodanalyzer
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foodanalyzer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-analyzer-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ============================================================
  # Promtail - Log Collector
  # ============================================================
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./logs:/var/log/app:ro
      - ./docker/promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - food-analyzer-network

  # ============================================================
  # Loki - Log Aggregation
  # ============================================================
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki-simple-config.yaml:/etc/loki/loki-config.yaml:ro
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      - food-analyzer-network

  # ============================================================
  # Grafana - Visualization Dashboard
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./docker/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./docker/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./docker/food-analyzer-dashboard.json:/etc/grafana/provisioning/dashboards/food-analyzer.json:ro
      - ./docker/log-analysis-dashboard.json:/etc/grafana/provisioning/dashboards/log-analysis.json:ro
      - grafana-storage:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - food-analyzer-network
    restart: unless-stopped

  # ============================================================
  # Prometheus - Metrics Collection
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - food-analyzer-network
    restart: unless-stopped

  # ============================================================
  # Adminer - Database Management
  # ============================================================
  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - food-analyzer-network
    restart: unless-stopped

networks:
  food-analyzer-network:
    driver: bridge

volumes:
  postgres_data:
  grafana-storage:
  prometheus-data: